name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write
  deployments: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-npm:
    name: Publish to npm
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - name: Publish Released Packages
        run: |
          for path in $(echo '${{ needs.release-please.outputs.paths_released }}' | jq -r '.[]'); do
            if [ -d "$path" ] && [ -f "$path/package.json" ]; then
              echo "Publishing $path"
              cd "$path" && npm publish --access public
              cd -
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    name: Publish to Docker Hub & GHCR
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & Push Released Packages
        run: |
          for path in $(echo '${{ needs.release-please.outputs.paths_released }}' | jq -r '.[]'); do
            pkg=$(basename "$path")

            # Skip oauth-core — it's a shared library, not an MCP server
            if [ "$pkg" = "oauth-core" ]; then
              echo "Skipping oauth-core (not an MCP server)"
              continue
            fi

            if [ -d "$path" ] && [ -f "$path/package.json" ]; then
              version=$(jq -r '.version' "$path/package.json")
              dockerhub="vineethnkrishnan/${pkg}-mcp"
              ghcr="ghcr.io/${{ github.repository_owner }}/${pkg}-mcp"

              echo "Building ${pkg}-mcp:$version → Docker Hub + GHCR"
              docker buildx build \
                --build-arg PACKAGE="$pkg" \
                --tag "$dockerhub:$version" \
                --tag "$dockerhub:latest" \
                --tag "$ghcr:$version" \
                --tag "$ghcr:latest" \
                --push \
                .
            fi
          done

  deploy-docs:
    name: Deploy Docs (Cloudflare Pages)
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run docs:build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/build --project-name=mcp-pool --commit-dirty=true
